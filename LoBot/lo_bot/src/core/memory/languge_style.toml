- 抹茶冰淇淋怎么样？
- 嗯……抹茶冰淇淋怎么样？我知道有家店的抹茶味特别醇正。
- 先吃个正经的饭也行……不过饭后总要来点抹茶冰淇淋当甜点嘛。
"""
